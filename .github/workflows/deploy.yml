name: Frontend CI/CD pipeline

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  ECR_REPOSITORY_URI: 414772274895.dkr.ecr.us-east-1.amazonaws.com/streamflow-frontend

jobs:
  build-and-push:
    name: Build and push docker image to ECR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build -f videostream-frontend/Dockerfile \
            -t ${{ env.ECR_REPOSITORY_URI }}:${{ github.sha }} \
            videostream-frontend

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.ECR_REPOSITORY_URI }}:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push image
        run: |
          docker push ${{ env.ECR_REPOSITORY_URI }}:${{ github.sha }}

  deploy-dev:
    name: Deploy to Development
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set image in parameter file
        run: |
          python3 -c "
          import json
          path = 'infracode/dev.json'
          with open(path) as f:
              params = json.load(f)
          for p in params:
              if p['ParameterKey'] == 'ContainerImage':
                  p['ParameterValue'] = '${{ env.ECR_REPOSITORY_URI }}:${{ github.sha }}'
          with open(path, 'w') as f:
              json.dump(params, f, indent=2)
          "
          cat infracode/dev.json

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --stack-name videostream-dev \
            --template-file infracode/stack.yml \
            --parameter-overrides file://infracode/dev.json \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

  deploy-staging:
    name: Deploy to Staging
    needs: [build-and-push, deploy-dev]
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set image in parameter file
        run: |
          python3 -c "
          import json
          path = 'infracode/stag.json'
          with open(path) as f:
              params = json.load(f)
          for p in params:
              if p['ParameterKey'] == 'ContainerImage':
                  p['ParameterValue'] = '${{ env.ECR_REPOSITORY_URI }}:${{ github.sha }}'
          with open(path, 'w') as f:
              json.dump(params, f, indent=2)
          "
          cat infracode/stag.json

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --stack-name videostream-stag \
            --template-file infracode/stack.yml \
            --parameter-overrides file://infracode/stag.json \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset