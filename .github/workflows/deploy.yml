name: Frontend CI/CD pipeline

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and push docker image to ECR
    runs-on: ubuntu-latest
    outputs:
          image-uri: ${{ steps.image.outputs.uri }}
    steps:
      # Checkout the source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configurationj AWS Creds
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{secrets.AWS_ROLE_ARN}}
          aws-region: ${{secrets.AWS_REGION}}

      # ECR Login
      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Store Image URI
      - name: Set Image URI
        id: image
        run: |
          echo "IMAGE_URI=${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_ENV
          echo "uri=${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_OUTPUT


      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -f videostream-frontend/Dockerfile -t $IMAGE_URI videostream-frontend

      # Scan Docker Image
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_URI }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # # Tag Docker Image
      # - name: Tag Docker Image
      #   run: |
      #     docker tag ${{secrets.ECR_REPOSITORY}}:${{github.sha}} \
      #     ${{secrets.AWS_ACCOUNT}}.dkr.ecr.${{secrets.AWS_REGION}}.amazonaws.com/${{secrets.ECR_REPOSITORY}}:${{github.sha}}

      # Push Docker Image to ECR
      - name: Push Docker Image to ECR
        run: |
          docker push $IMAGE_URI
  deploy-dev:
    name: Deploy to Development
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: development
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
 
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition videostream-dev-task \
            --query 'taskDefinition' \
            --output json > task-definition-dev.json
 
      - name: Fill in new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-dev.json
          container-name: Streaming-App
          image: ${{ needs.build-and-push.outputs.image-uri }}
 
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: videostream-dev
          cluster: videostream-dev
          wait-for-service-stability: true
 
  deploy-staging:
    name: Deploy to Staging
    needs: [build-and-push, deploy-dev]
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
 
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition videostream-stag-task \
            --query 'taskDefinition' \
            --output json > task-definition-stag.json
 
      - name: Fill in new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-stag.json
          container-name: Streaming-App
          image: ${{ needs.build-and-push.outputs.image-uri }}
 
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: videostream-stag
          cluster: videostream-stag
          wait-for-service-stability: true
   