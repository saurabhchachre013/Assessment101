name: Frontend CI/CD pipeline

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and push docker image to ECR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    env:
      ECR_REPOSITORY: streamflow-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f videostream-frontend/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            videostream-frontend
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.build-image.outputs.image }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy-dev:
    name: Deploy to Development
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug needs output
        run: echo "RECEIVED IMAGE = '${{ needs.build-and-push.outputs.image }}'"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set image in parameter file
        run: |
          python3 -c "
          import json
          path = 'infracode/dev.json'
          with open(path) as f:
              params = json.load(f)
          for p in params:
              if p['ParameterKey'] == 'ContainerImage':
                  p['ParameterValue'] = '${{ needs.build-and-push.outputs.image }}'
          with open(path, 'w') as f:
              json.dump(params, f, indent=2)
          "
          cat infracode/dev.json

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --stack-name videostream-dev \
            --template-file infracode/stack.yml \
            --parameter-overrides file://infracode/dev.json \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

  deploy-staging:
    name: Deploy to Staging
    needs: [build-and-push, deploy-dev]
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set image in parameter file
        run: |
          python3 -c "
          import json
          path = 'infracode/stag.json'
          with open(path) as f:
              params = json.load(f)
          for p in params:
              if p['ParameterKey'] == 'ContainerImage':
                  p['ParameterValue'] = '${{ needs.build-and-push.outputs.image }}'
          with open(path, 'w') as f:
              json.dump(params, f, indent=2)
          "
          cat infracode/stag.json

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --stack-name videostream-stag \
            --template-file infracode/stack.yml \
            --parameter-overrides file://infracode/stag.json \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset