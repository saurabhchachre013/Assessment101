name: Frontend CI/CD pipeline

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and push docker image to ECR
    runs-on: ubuntu-latest
    outputs:
          image-uri: ${{ steps.image.outputs.uri }}
    steps:
      # Checkout the source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configurationj AWS Creds
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{secrets.AWS_ROLE_ARN}}
          aws-region: ${{secrets.AWS_REGION}}

      # ECR Login
      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Store Image URI
      - name: Set Image URI
        id: image
        run: |
          echo "IMAGE_URI=${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_ENV
          echo "uri=${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_OUTPUT


      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -f videostream-frontend/Dockerfile -t $IMAGE_URI videostream-frontend

      # Scan Docker Image
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_URI }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # # Tag Docker Image
      # - name: Tag Docker Image
      #   run: |
      #     docker tag ${{secrets.ECR_REPOSITORY}}:${{github.sha}} \
      #     ${{secrets.AWS_ACCOUNT}}.dkr.ecr.${{secrets.AWS_REGION}}.amazonaws.com/${{secrets.ECR_REPOSITORY}}:${{github.sha}}

      # Push Docker Image to ECR
      - name: Push Docker Image to ECR
        run: |
          docker push $IMAGE_URI

  deploy-dev:
    name: Deploy to Development
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: development
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Inject image URI into parameter file
        run: |
          sed -i 's|"ParameterValue": ".*ecr.*"|"ParameterValue": "${{ needs.build-and-push.outputs.image-uri }}"|' infracode/dev.json

      - name: Deploy CloudFormation stack (dev)
        run: |
          aws cloudformation deploy \
            --stack-name videostream-dev \
            --template-file infracode/stack.yml \
            --parameter-overrides file://infracode/dev.json \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset
      - name: Wait for ECS service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster videostream-dev \
            --services videostream-dev

  deploy-staging:
    name: Deploy to Staging
    needs: [build-and-push, deploy-dev]
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Inject image URI into parameter file
        run: |
          sed -i 's|"ParameterValue": ".*ecr.*"|"ParameterValue": "${{ needs.build-and-push.outputs.image-uri }}"|' infracode/stag.json
      
      - name: Deploy CloudFormation stack (staging)
        run: |
          aws cloudformation deploy \
            --stack-name videostream-stag \
            --template-file infracode/stack.yml \
            --parameter-overrides file://infracode/stag.json \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Wait for ECS service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster videostream-stag \
            --services videostream-stag                   